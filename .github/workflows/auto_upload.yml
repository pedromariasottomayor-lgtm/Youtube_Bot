# ─────────────────────────────────────────────────────────────────
# GitHub Actions Workflow — Auto YouTube Upload
# Posts 3x/day: 8AM, 2PM, 8PM UTC (optimal for English audience)
# YouTube API limit: 6 videos/day — we use 3 for safety
# ─────────────────────────────────────────────────────────────────

name: Auto YouTube Upload

on:
  schedule:
    # 3 posts per day, spaced 6 hours apart
    - cron: "0 8 * * *"    # 8:00 AM UTC (4 AM EST / 9 AM UK)
    - cron: "0 14 * * *"   # 2:00 PM UTC (10 AM EST / 3 PM UK)
    - cron: "0 20 * * *"   # 8:00 PM UTC (4 PM EST / 9 PM UK)

  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  upload-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: bot-state-${{ github.run_number }}
          restore-keys: bot-state-

      - name: Restore YouTube token
        run: |
          if [ -n "${{ secrets.YOUTUBE_TOKEN_B64 }}" ]; then
            echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle
          fi

      - name: Run YouTube bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python main.py

      - name: Save state
        uses: actions/cache@v4
        with:
          path: state.json
          key: bot-state-${{ github.run_number }}

      - name: Save updated YouTube token
        if: always()
        run: |
          if [ -f youtube_token.pickle ]; then
            TOKEN_B64=$(base64 -w 0 youtube_token.pickle)
            echo "TOKEN_B64=$TOKEN_B64" >> $GITHUB_ENV
          fi
